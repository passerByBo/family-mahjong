name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext for Cloudflare
        run: npx opennextjs-cloudflare build
        working-directory: apps/web

      - name: Rename worker.js to _worker.js for Cloudflare Pages
        run: mv .open-next/worker.js .open-next/_worker.js
        working-directory: apps/web

      - name: Move static assets to root for Cloudflare Pages
        run: |
          if [ -d .open-next/assets ]; then
            find .open-next/assets -mindepth 1 -maxdepth 1 -exec cp -r {} .open-next/ \;
            rm -rf .open-next/assets
          fi
        working-directory: apps/web

      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy .open-next --project-name=family-mahjong --branch=main --commit-dirty=true
