<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 狗 - 蓝色背景 -->
  <circle cx="50" cy="50" r="50" fill="#4A90E2"/>
  <!-- 耳朵 -->
  <ellipse cx="28" cy="40" rx="10" ry="18" fill="#8B6F47" transform="rotate(-20 28 40)"/>
  <ellipse cx="72" cy="40" rx="10" ry="18" fill="#8B6F47" transform="rotate(20 72 40)"/>
  <!-- 脸 -->
  <circle cx="50" cy="55" r="28" fill="#D4A574"/>
  <!-- 眼睛 -->
  <circle cx="40" cy="50" r="5" fill="#3D3D3D"/>
  <circle cx="60" cy="50" r="5" fill="#3D3D3D"/>
  <circle cx="42" cy="48" r="2" fill="#FFF"/>
  <circle cx="62" cy="48" r="2" fill="#FFF"/>
  <!-- 鼻子 -->
  <ellipse cx="50" cy="62" rx="6" ry="5" fill="#3D3D3D"/>
  <ellipse cx="48" cy="60" rx="1.5" ry="1" fill="#FFF"/>
  <!-- 嘴巴 -->
  <path d="M50,64 L50,68" stroke="#3D3D3D" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50,68 Q42,72 38,68" fill="none" stroke="#3D3D3D" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50,68 Q58,72 62,68" fill="none" stroke="#3D3D3D" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 舌头 -->
  <ellipse cx="50" cy="72" rx="4" ry="3" fill="#FF6B9D"/>
