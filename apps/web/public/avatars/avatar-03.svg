  <line x1="30" y1="62" x2="40" y2="62" stroke="#C0C0C0" stroke-width="1"/>
  <line x1="60" y1="59" x2="70" y2="58" stroke="#C0C0C0" stroke-width="1"/>
  <line x1="60" y1="62" x2="70" y2="62" stroke="#C0C0C0" stroke-width="1"/>
